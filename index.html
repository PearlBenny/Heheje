<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عيد ميلاد سعيد ✨</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           1. CONFIGURATION & VARIABLES (PREMIUM THEME)
           ========================================== */
        :root {
            --primary-color: #D6A4A4; /* Elegant Rose Gold */
            --accent-color: #B5838D;
            --light-bg: #FCF9F9;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-dark: #4A3B3C;
            --text-muted: #8A797B;
            --font-main: 'Tajawal', sans-serif;
            --transition-speed: 0.6s;
            --shadow-soft: 0 15px 35px rgba(181, 131, 141, 0.12);
        }

        /* ==========================================
           2. GENERAL & BASE STYLES
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--light-bg);
            color: var(--text-dark);
            user-select: none;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, #FFF0F3 0%, #FCF9F9 40%, #EFE9E9 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* ==========================================
           3. SCENE MANAGER & TRANSITIONS
           ========================================== */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-speed) ease-in-out, transform var(--transition-speed) ease-in-out;
            transform: translateY(20px);
        }

        .scene.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.5;
            letter-spacing: 0.5px;
        }

        .btn {
            font-family: var(--font-main);
            border: none;
            padding: 0.85rem 2.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
        }

        .btn-primary { 
            background-color: var(--accent-color); 
            color: white; 
        }
        
        .btn-secondary { 
            background-color: transparent; 
            color: var(--accent-color); 
            border: 2px solid var(--accent-color); 
        }

        /* ==========================================
           4. INTRO SCREEN
           ========================================== */
        #intro-scene { background-color: #2A2425; color: #F8F4F4; z-index: 10; }
        #intro-scene .text-1 { font-size: 2rem; font-weight: 700; opacity: 0; transform: translateY(20px); transition: all 1s ease; color: #EAD2D2; }
        #intro-scene .text-2 { font-size: 1.1rem; color: #A89B9D; margin-top: 1.5rem; opacity: 0; transition: all 1s ease; animation: pulse 2s infinite alternate; }

        /* ==========================================
           5. SCENE 1: BUTTONS
           ========================================== */
        .btn-container-s1 { display: flex; gap: 1rem; align-items: center; justify-content: center; width: 100%; min-height: 120px; }

        /* ==========================================
           6. SCENE 2: SLIDER
           ========================================== */
        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            position: relative;
        }

        .slider-label {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .slider-container {
            position: relative;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #sad-emoji {
            position: absolute;
            bottom: -50px; 
            font-size: 2.2rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .vertical-slider {
            -webkit-appearance: slider-vertical;
            appearance: slider-vertical;
            width: 8px;
            height: 200px;
            background: #EAE0E1;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        .vertical-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid var(--accent-color);
            transition: transform 0.1s;
        }

        /* ==========================================
           7. SCENE 3: CAKE
           ========================================== */
        .cake-container {
            position: relative;
            margin: 1rem 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }

        .cake-container:active {
            cursor: grabbing;
        }

        /* تم تكبير الكيكة لتصبح 300px */
        .simple-cake {
            width: 300px; 
            height: auto;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.08));
            transition: transform 0.2s ease;
        }

        /* ==========================================
           8. SCENE 4: ENVELOPE 💌
           ========================================== */
        .envelope-wrapper {
            position: relative;
            width: 260px;
            height: 170px;
            margin-top: 1rem;
            cursor: pointer;
            background: #FDFBFC;
            border-radius: 8px;
            box-shadow: 0 12px 30px rgba(181, 131, 141, 0.15);
            border: 1px solid #F0E8E9;
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-left: 130px solid #F9F5F6;
            border-right: 130px solid #F9F5F6;
            border-bottom: 85px solid #F4EDED;
            border-top: 85px solid transparent;
            border-radius: 0 0 8px 8px;
            z-index: 4;
            pointer-events: none;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 130px solid transparent;
            border-right: 130px solid transparent;
            border-top: 95px solid #FDFBFC;
            transform-origin: top;
            transition: transform 0.7s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 5;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.04));
        }

        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .heart-seal {
            position: absolute;
            top: 75px; 
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 35px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.1rem;
            z-index: 6;
            transition: opacity 0.3s ease;
            box-shadow: 0 4px 10px rgba(181, 131, 141, 0.4);
        }

        .envelope-wrapper.open .heart-seal {
            opacity: 0;
        }

        .letter-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(42, 36, 37, 0.6);
            backdrop-filter: blur(5px);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .letter-popup-overlay.active { opacity: 1; pointer-events: auto; }

        .letter {
            width: 100%;
            max-width: 360px;
            background: #FFFEFC;
            border-radius: 12px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transform: translateY(50px) scale(0.95);
            transition: all 0.7s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }
        
        .letter::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; width: 6px;
            background: var(--primary-color);
        }

        .letter-popup-overlay.active .letter { transform: translateY(0) scale(1); }
        .letter-header { text-align: right; font-weight: 700; color: var(--accent-color); font-size: 1.3rem; margin-bottom: 1.5rem; }
        .letter-body { text-align: justify; line-height: 1.9; font-size: 1.1rem; color: #5A4A4C; margin-bottom: 2.5rem; }
        .letter-footer { text-align: left; font-weight: 700; color: var(--accent-color); font-size: 1.2rem; }

        /* ==========================================
           9. EFFECTS & ANIMATIONS
           ========================================== */
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }
        .bounce-active { animation: bounce 0.6s ease; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .heart-particle { position: fixed; pointer-events: none; z-index: 999; animation: floatUp 2.5s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translateY(-200px) scale(0.6) rotate(45deg); opacity: 0; } }

        .confetti { position: fixed; width: 8px; height: 16px; border-radius: 4px; z-index: 999; animation: fall 3s ease-out forwards; }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <section id="intro-scene" class="scene active">
        <div class="text-1" id="intro-t1">✨ عندي سؤال صغير…</div>
        <div class="text-2" id="intro-t2">اضغطي أي مكان بالشاشة</div>
    </section>

    <section id="scene-1" class="scene">
        <div class="card">
            <h2>عيد ميلاد مين اليوم؟ 🎀</h2>
            <div class="btn-container-s1">
                <button id="btn-no" class="btn btn-secondary">لا أعرف</button>
                <button id="btn-yes" class="btn btn-primary">أنا!</button>
            </div>
        </div>
    </section>

    <section id="scene-2" class="scene">
        <div class="card">
            <h2>كنتي متوقعة إني أهتم كثير ليوم زي هيك؟</h2>
            <div class="slider-wrapper">
                <span class="slider-label" style="color: #A3C9A6;">نعم</span>
                <div class="slider-container">
                    <input type="range" id="love-slider" class="vertical-slider" min="0" max="100" value="50">
                </div>
                <div id="sad-emoji">😢</div>
                <span class="slider-label" style="color: #D6A4A4;">لا</span>
            </div>
        </div>
    </section>

    <section id="scene-3" class="scene">
        <div class="card">
            <h2>اسحبي إصبعك لتقطيع الكيكة! 🎂</h2>
            <div class="cake-container" id="cake-wrapper">
                <img src="cake.png" id="the-cake" class="simple-cake" alt="Cake" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'300\' height=\'300\' viewBox=\'0 0 100 100\'><path d=\'M20 70 Q 50 85 80 70 L 80 40 Q 50 55 20 40 Z\' fill=\'%23EAD2D2\'/><path d=\'M20 40 Q 50 55 80 40 Q 50 25 20 40 Z\' fill=\'%23FCF9F9\' stroke=\'%23D6A4A4\' stroke-width=\'1\'/><rect x=\'48\' y=\'15\' width=\'4\' height=\'15\' fill=\'%23B5838D\' rx=\'2\'/><circle cx=\'50\' cy=\'10\' r=\'4\' fill=\'%23D4AF37\'/></svg>'">
            </div>
        </div>
    </section>

    <section id="scene-4" class="scene">
        <div class="card">
            <h2>عندك رسالة 💌</h2>
            <div class="envelope-wrapper" id="envelope-wrapper">
                <div class="envelope-front"></div>
                <div class="envelope-flap"></div>
                <div class="heart-seal">❤</div>
            </div>
        </div>
    </section>

    <div class="letter-popup-overlay" id="letter-overlay">
        <article class="letter">
            <div class="letter-header" id="recipient-name">عزيزتي</div>
            <p class="letter-body" id="birthday-message">
                النص يوضع هنا.
            </p>
            <div class="letter-footer" id="sender-name"></div>
        </article>
    </div>

    <script>
        const CONFIG = {
            recipientName: "سارة", 
            senderName: "عبدالله",
            message: "كل عام وأنتِ ألطف وأجمل من كبر! أتمنى لكِ سنة مليئة بالفرح والضحكات التي تشبه قلبك. هذا الموقع الصغير صنعته خصيصاً لأجلك لأعبر لكِ عن مدى تميز هذا اليوم."
        };

        document.getElementById('recipient-name').innerText = `عزيزتي ${CONFIG.recipientName} ✨`;
        document.getElementById('sender-name').innerText = CONFIG.senderName;
        document.getElementById('birthday-message').innerText = CONFIG.message;

        function navigateToScene(currentId, nextId) {
            const current = document.getElementById(currentId);
            const next = document.getElementById(nextId);
            current.classList.remove('active');
            setTimeout(() => { next.classList.add('active'); }, 600);
        }

        /* ---------------- INTRO ---------------- */
        setTimeout(() => {
            document.getElementById('intro-t1').style.opacity = '1';
            document.getElementById('intro-t1').style.transform = 'translateY(0)';
        }, 500);
        setTimeout(() => { document.getElementById('intro-t2').style.opacity = '1'; }, 1500);

        document.getElementById('intro-scene').addEventListener('click', () => {
            navigateToScene('intro-scene', 'scene-1');
        });

        /* ---------------- SCENE 1 ---------------- */
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        let clickCount = 0;
        let yesScale = 1;
        let noScale = 1;

        btnNo.addEventListener('click', (e) => {
            e.stopPropagation();
            if (clickCount < 6) {
                clickCount++;
                yesScale += 0.3;
                noScale -= 0.12;
                btnYes.style.transform = `scale(${yesScale})`;
                btnNo.style.transform = `scale(${noScale})`;
                const randomX = (Math.random() - 0.5) * 30;
                const randomY = (Math.random() - 0.5) * 30;
                btnNo.style.translate = `${randomX}px ${randomY}px`;
            }
        });

        btnYes.addEventListener('click', () => {
            btnYes.classList.add('bounce-active');
            setTimeout(() => { navigateToScene('scene-1', 'scene-2'); }, 600);
        });

        /* ---------------- SCENE 2: SLIDER ---------------- */
        const slider = document.getElementById('love-slider');
        const sadEmoji = document.getElementById('sad-emoji');
        let scene2Done = false;
        
        slider.addEventListener('input', () => {
            if (scene2Done) return;
            let val = parseInt(slider.value);
            
            // السحب للأسفل (القيمة تقترب من 0) يظهر إيموجي الحزن
            if (val < 20) {
                sadEmoji.style.opacity = '1';
                sadEmoji.style.transform = 'translateY(-20px) scale(1.1)';
            } else {
                sadEmoji.style.opacity = '0';
                sadEmoji.style.transform = 'translateY(0) scale(1)';
            }

            // السحب للأعلى (القيمة تقترب من 100) ينتقل للصفحة التالية
            if (val > 85) {
                scene2Done = true;
                slider.disabled = true;
                createConfetti();
                setTimeout(() => { navigateToScene('scene-2', 'scene-3'); }, 600);
            }
        });

        function resetSlider() {
            if (!scene2Done) {
                slider.value = 50;
                sadEmoji.style.opacity = '0';
                sadEmoji.style.transform = 'translateY(0) scale(1)';
            }
        }
        slider.addEventListener('touchend', resetSlider);
        slider.addEventListener('mouseup', resetSlider);

        /* ---------------- SCENE 3: CAKE SWIPE (CUTTING) ---------------- */
        const theCake = document.getElementById('the-cake');
        const cakeWrapper = document.getElementById('cake-wrapper');
        let cakeCut = false;
        let startX = 0;
        let startY = 0;

        function handleSwipeStart(e) {
            if (cakeCut) return;
            startX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
            startY = e.changedTouches ? e.changedTouches[0].screenY : e.screenY;
        }

        function handleSwipeEnd(e) {
            if (cakeCut) return;
            let endX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
            let endY = e.changedTouches ? e.changedTouches[0].screenY : e.screenY;
            
            let diffX = Math.abs(endX - startX);
            let diffY = Math.abs(endY - startY);

            // تم السحب بشكل كافٍ
            if (diffX > 40 || diffY > 40) {
                cakeCut = true;
                
                // إنشاء تأثير انقسام الكيكة لنصفين باستخدام clip-path
                const cakeRect = theCake.getBoundingClientRect();
                const cakeSrc = theCake.src;
                
                theCake.style.display = 'none'; // إخفاء الأصلية
                
                const leftHalf = document.createElement('img');
                leftHalf.src = cakeSrc;
                leftHalf.className = 'simple-cake';
                leftHalf.style.position = 'absolute';
                leftHalf.style.clipPath = 'polygon(0 0, 50% 0, 50% 100%, 0 100%)';
                leftHalf.style.transition = 'transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1.2s';
                
                const rightHalf = document.createElement('img');
                rightHalf.src = cakeSrc;
                rightHalf.className = 'simple-cake';
                rightHalf.style.position = 'absolute';
                rightHalf.style.clipPath = 'polygon(50% 0, 100% 0, 100% 100%, 50% 100%)';
                rightHalf.style.transition = 'transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1.2s';

                cakeWrapper.appendChild(leftHalf);
                cakeWrapper.appendChild(rightHalf);

                // تفعيل حركة الانقسام
                requestAnimationFrame(() => {
                    leftHalf.style.transform = 'translate(-35px, 25px) rotate(-10deg)';
                    rightHalf.style.transform = 'translate(35px, 25px) rotate(10deg)';
                    leftHalf.style.opacity = '0.7';
                    rightHalf.style.opacity = '0.7';
                });
                
                createConfetti();
                createHeartsBurst();
                
                setTimeout(() => {
                    navigateToScene('scene-3', 'scene-4');
                }, 1600);
            }
        }

        cakeWrapper.addEventListener('touchstart', handleSwipeStart);
        cakeWrapper.addEventListener('touchend', handleSwipeEnd);
        cakeWrapper.addEventListener('mousedown', handleSwipeStart);
        cakeWrapper.addEventListener('mouseup', handleSwipeEnd);

        /* ---------------- SCENE 4: ENVELOPE ---------------- */
        const envelopeWrapper = document.getElementById('envelope-wrapper');
        const letterOverlay = document.getElementById('letter-overlay');

        envelopeWrapper.addEventListener('click', () => {
            envelopeWrapper.classList.add('open');
            setTimeout(() => {
                letterOverlay.classList.add('active');
                createHeartsBurst();
            }, 800);
        });

        /* ---------------- FX FUNCTIONS ---------------- */
        function createConfetti() {
            const colors = ['#D6A4A4', '#B5838D', '#EAD2D2', '#D4AF37', '#F9F5F6'];
            for (let i = 0; i < 70; i++) {
                const particle = document.createElement('div');
                particle.classList.add('confetti');
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = '-20px';
                particle.style.transform = `scale(${Math.random() * 0.7 + 0.3})`;
                particle.style.animationDelay = Math.random() * 0.5 + 's';
                particle.style.animationDuration = Math.random() * 2 + 2 + 's';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 4000);
            }
        }

        function createHeartsBurst() {
            for (let i = 0; i < 18; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart-particle');
                heart.innerHTML = '✨'; // تم استبدال القلب بلمعة تناسب الثيم الجديد
                if(Math.random() > 0.5) heart.innerHTML = '❤';
                
                heart.style.left = (Math.random() * 60 + 20) + 'vw';
                heart.style.top = (Math.random() * 40 + 30) + 'vh';
                heart.style.fontSize = (Math.random() * 12 + 12) + 'px';
                heart.style.color = Math.random() > 0.5 ? '#D6A4A4' : '#D4AF37';
                heart.style.animationDelay = (Math.random() * 0.4) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 2500);
            }
        }
    </script>
</body>
</html>
