<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عيد ميلاد سعيد ✨</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           1. CONFIGURATION & VARIABLES
           ========================================== */
        :root {
            --primary-pink: #ffb7c5;
            --light-pink: #ffe5ec;
            --dark-pink: #fb6f92;
            --text-dark: #4a4a4a;
            --bg-pattern: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60"><path d="M30 20c-2-3-5-3-7-1-3 3-1 7 2 9l5 4 5-4c3-2 5-6 2-9-2-2-5-2-7 1zm-15 20c-1-2-3-2-4-1-1 1-1 4 1 5l3 2 3-2c2-1 2-4 1-5-1-1-3-1-4 1z" fill="%23fb6f92" fill-opacity="0.08"/></svg>');
            --font-main: 'Tajawal', sans-serif;
            --transition-speed: 0.6s;
        }

        /* ==========================================
           2. GENERAL & BASE STYLES
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-main);
            background-color: var(--light-pink);
            color: var(--text-dark);
            user-select: none;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--bg-pattern);
            z-index: 1;
            pointer-events: none;
        }

        /* ==========================================
           3. SCENE MANAGER & TRANSITIONS
           ========================================== */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-speed) ease-in-out, transform var(--transition-speed) ease-in-out;
            transform: scale(0.95);
        }

        .scene.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2.5rem 1.5rem;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(251, 111, 146, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #3a3a3a;
            line-height: 1.4;
        }

        .btn {
            font-family: var(--font-main);
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .btn-primary { background-color: var(--dark-pink); color: white; }
        .btn-secondary { background-color: white; color: var(--dark-pink); border: 2px solid var(--light-pink); }

        /* ==========================================
           4. INTRO SCREEN
           ========================================== */
        #intro-scene { background-color: #1a1a1a; color: #ffffff; z-index: 10; }
        #intro-scene .text-1 { font-size: 1.8rem; font-weight: 700; opacity: 0; transform: translateY(20px); transition: all 0.8s ease; }
        #intro-scene .text-2 { font-size: 1.1rem; color: #aaaaaa; margin-top: 1.5rem; opacity: 0; transition: all 0.8s ease; animation: pulse 1.5s infinite alternate; }

        /* ==========================================
           5. SCENE 1: BUTTONS
           ========================================== */
        .btn-container-s1 { display: flex; gap: 1rem; align-items: center; justify-content: center; width: 100%; min-height: 150px; }

        /* ==========================================
           6. SCENE 2: SLIDER
           ========================================== */
        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 250px;
            margin: 1rem 0;
            position: relative;
        }

        .slider-label {
            font-weight: 900;
            font-size: 1.4rem;
        }

        .slider-container {
            position: relative;
            height: 180px;
            width: 40px;
            margin: 0.5rem 0;
        }

        #sad-emoji {
            position: absolute;
            top: 25px;
            font-size: 2.5rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .vertical-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 180px;
            height: 16px;
            border-radius: 10px;
            /* Gradient: Green (Yes) at 0, Red (No) at 100 */
            background: linear-gradient(90deg, #4caf50 0%, #f44336 100%);
            outline: none;
            position: absolute;
            top: 84px;
            left: -70px;
            transform: rotate(-90deg); /* Rotate to make it vertical */
        }

        .vertical-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            border: 4px solid var(--dark-pink);
            transition: transform 0.1s;
        }

        /* ==========================================
           7. SCENE 3: CAKE
           ========================================== */
        .simple-cake {
            width: 220px;
            height: auto;
            margin: 2rem 0;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .simple-cake:active {
            transform: scale(0.9);
        }

        /* ==========================================
           8. SCENE 4: ENVELOPE 💌
           ========================================== */
        .envelope-wrapper {
            position: relative;
            width: 240px;
            height: 160px;
            margin-top: 2rem;
            cursor: pointer;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Creating the folded look of an envelope */
            border-left: 120px solid #f9f9f9;
            border-right: 120px solid #f9f9f9;
            border-bottom: 80px solid #f0f0f0;
            border-top: 80px solid transparent;
            border-radius: 0 0 10px 10px;
            z-index: 4;
            pointer-events: none;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 120px solid transparent;
            border-right: 120px solid transparent;
            border-top: 90px solid #ffffff;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 5;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.08));
        }

        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .heart-seal {
            position: absolute;
            top: 72px; /* Positioned right at the tip of the flap */
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            z-index: 6;
            transition: opacity 0.3s ease;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .envelope-wrapper.open .heart-seal {
            opacity: 0;
        }

        /* Letter sliding out mechanism */
        .letter-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .letter-popup-overlay.active { opacity: 1; pointer-events: auto; }

        .letter {
            width: 100%;
            max-width: 340px;
            background: #fffdf9;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: translateY(100vh);
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-right: 6px solid var(--dark-pink);
        }

        .letter-popup-overlay.active .letter { transform: translateY(0); }
        .letter-header { text-align: right; font-weight: 700; color: var(--dark-pink); font-size: 1.2rem; margin-bottom: 1rem; }
        .letter-body { text-align: justify; line-height: 1.8; font-size: 1.05rem; color: #555; margin-bottom: 2rem; }
        .letter-footer { text-align: left; font-weight: 700; color: var(--dark-pink); font-size: 1.1rem; }

        /* ==========================================
           9. EFFECTS & ANIMATIONS
           ========================================== */
        @keyframes pulse { from { opacity: 0.3; } to { opacity: 0.8; } }
        .bounce-active { animation: bounce 0.6s ease; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        .heart-particle { position: fixed; pointer-events: none; z-index: 999; animation: floatUp 2s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translateY(-150px) scale(0.5) rotate(45deg); opacity: 0; } }

        .confetti { position: fixed; width: 10px; height: 10px; z-index: 999; animation: fall 3s ease-out forwards; }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <section id="intro-scene" class="scene active">
        <div class="text-1" id="intro-t1">✨ عندي سؤال صغير…</div>
        <div class="text-2" id="intro-t2">اضغطي أي مكان بالشاشة</div>
    </section>

    <section id="scene-1" class="scene">
        <div class="card">
            <h2>عيد ميلاد مين اليوم؟ 🎀</h2>
            <div class="btn-container-s1">
                <button id="btn-no" class="btn btn-secondary">لا أعرف</button>
                <button id="btn-yes" class="btn btn-primary">أنا!</button>
            </div>
        </div>
    </section>

    <section id="scene-2" class="scene">
        <div class="card">
            <h2>كنتي متوقعة إني أهتم كثير ليوم زي هيك؟</h2>
            <div class="slider-wrapper">
                <span class="slider-label" style="color: #f44336;">لا</span>
                <div id="sad-emoji">😢</div>
                <div class="slider-container">
                    <input type="range" id="love-slider" class="vertical-slider" min="0" max="100" value="50">
                </div>
                <span class="slider-label" style="color: #4caf50;">نعم</span>
            </div>
        </div>
    </section>

    <section id="scene-3" class="scene">
        <div class="card">
            <h2>اضغطي على الكيكة! 🎂</h2>
            <img src="cake.png" id="the-cake" class="simple-cake" alt="Cake" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'240\' height=\'240\' viewBox=\'0 0 100 100\'><circle cx=\'50\' cy=\'60\' r=\'35\' fill=\'%23fb6f92\'/><rect x=\'47\' y=\'10\' width=\'6\' height=\'15\' fill=\'%23ffb7c5\'/><circle cx=\'50\' cy=\'8\' r=\'4\' fill=\'%23ffd166\'/></svg>'">
        </div>
    </section>

    <section id="scene-4" class="scene">
        <div class="card">
            <h2>عندك رسالة 💌</h2>
            <div class="envelope-wrapper" id="envelope-wrapper">
                <div class="envelope-front"></div>
                <div class="envelope-flap"></div>
                <div class="heart-seal">❤️</div>
            </div>
        </div>
    </section>

    <div class="letter-popup-overlay" id="letter-overlay">
        <article class="letter">
            <div class="letter-header" id="recipient-name">عزيزتي</div>
            <p class="letter-body" id="birthday-message">
                النص يوضع هنا.
            </p>
            <div class="letter-footer" id="sender-name"></div>
        </article>
    </div>

    <script>
        const CONFIG = {
            recipientName: "سارة", 
            senderName: "عبدالله",
            message: "كل عام وأنتِ ألطف وأجمل من كبر! أتمنى لكِ سنة مليئة بالفرح والضحكات التي تشبه قلبك. هذا الموقع الصغير صنعته خصيصاً لأجلك لأعبر لكِ عن مدى تميز هذا اليوم."
        };

        document.getElementById('recipient-name').innerText = `عزيزتي ${CONFIG.recipientName} ✨`;
        document.getElementById('sender-name').innerText = CONFIG.senderName;
        document.getElementById('birthday-message').innerText = CONFIG.message;

        function navigateToScene(currentId, nextId) {
            const current = document.getElementById(currentId);
            const next = document.getElementById(nextId);
            current.classList.remove('active');
            setTimeout(() => { next.classList.add('active'); }, 600);
        }

        /* ---------------- INTRO ---------------- */
        setTimeout(() => {
            document.getElementById('intro-t1').style.opacity = '1';
            document.getElementById('intro-t1').style.transform = 'translateY(0)';
        }, 500);
        setTimeout(() => { document.getElementById('intro-t2').style.opacity = '1'; }, 1500);

        document.getElementById('intro-scene').addEventListener('click', () => {
            navigateToScene('intro-scene', 'scene-1');
        });

        /* ---------------- SCENE 1 ---------------- */
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        let clickCount = 0;
        let yesScale = 1;
        let noScale = 1;

        btnNo.addEventListener('click', (e) => {
            e.stopPropagation();
            if (clickCount < 6) {
                clickCount++;
                yesScale += 0.4;
                noScale -= 0.12;
                btnYes.style.transform = `scale(${yesScale})`;
                btnNo.style.transform = `scale(${noScale})`;
                const randomX = (Math.random() - 0.5) * 20;
                const randomY = (Math.random() - 0.5) * 20;
                btnNo.style.translate = `${randomX}px ${randomY}px`;
            }
        });

        btnYes.addEventListener('click', () => {
            btnYes.classList.add('bounce-active');
            setTimeout(() => { navigateToScene('scene-1', 'scene-2'); }, 600);
        });

        /* ---------------- SCENE 2: SLIDER ---------------- */
        const slider = document.getElementById('love-slider');
        const sadEmoji = document.getElementById('sad-emoji');
        let scene2Done = false;
        
        slider.addEventListener('input', () => {
            if (scene2Done) return;
            let val = parseInt(slider.value);
            
            // السحب للأعلى (أحمر / لا) - القيمة تقترب من 100 بسبب الدوران
            if (val > 85) {
                sadEmoji.style.opacity = '1';
                sadEmoji.style.transform = 'translateY(-15px) scale(1.2)';
            } else {
                sadEmoji.style.opacity = '0';
                sadEmoji.style.transform = 'translateY(0) scale(1)';
            }

            // السحب للأسفل (أخضر / نعم) - القيمة تقترب من 0
            if (val < 10) {
                scene2Done = true;
                slider.disabled = true;
                createConfetti();
                setTimeout(() => { navigateToScene('scene-2', 'scene-3'); }, 800);
            }
        });

        // إذا تم الإفلات ولم تصل للنجاح ترجع للمنتصف
        function resetSlider() {
            if (!scene2Done) {
                slider.value = 50;
                sadEmoji.style.opacity = '0';
            }
        }
        slider.addEventListener('touchend', resetSlider);
        slider.addEventListener('mouseup', resetSlider);


        /* ---------------- SCENE 3: CAKE ---------------- */
        const theCake = document.getElementById('the-cake');
        let cakeClicked = false;

        theCake.addEventListener('click', () => {
            if (cakeClicked) return;
            cakeClicked = true;
            
            // تأثير ضغطة بسيطة
            theCake.style.transform = 'scale(0.9)';
            createConfetti();
            createHeartsBurst();
            
            setTimeout(() => {
                navigateToScene('scene-3', 'scene-4');
            }, 1200);
        });


        /* ---------------- SCENE 4: ENVELOPE ---------------- */
        const envelopeWrapper = document.getElementById('envelope-wrapper');
        const letterOverlay = document.getElementById('letter-overlay');

        envelopeWrapper.addEventListener('click', () => {
            envelopeWrapper.classList.add('open');
            setTimeout(() => {
                letterOverlay.classList.add('active');
                createHeartsBurst();
            }, 700);
        });


        /* ---------------- FX FUNCTIONS ---------------- */
        function createConfetti() {
            const colors = ['#fb6f92', '#ffb7c5', '#ffe5ec', '#ffcbf2', '#f3c68f', '#4caf50'];
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.classList.add('confetti');
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = '-20px';
                particle.style.transform = `scale(${Math.random() * 0.6 + 0.4})`;
                particle.style.animationDelay = Math.random() * 0.5 + 's';
                particle.style.animationDuration = Math.random() * 1.5 + 1.5 + 's';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 3000);
            }
        }

        function createHeartsBurst() {
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart-particle');
                heart.innerHTML = '❤️';
                heart.style.left = (Math.random() * 60 + 20) + 'vw';
                heart.style.top = (Math.random() * 40 + 30) + 'vh';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                heart.style.animationDelay = (Math.random() * 0.3) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 2000);
            }
        }
    </script>
</body>
</html>
